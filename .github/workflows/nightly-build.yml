name: Nightly Build and Push

on:
  schedule:
    - cron: "0 0 * * *"   # 12:00 AM UTC nightly
  workflow_dispatch:       # allows manual runs for testing/demo

permissions:
  contents: read
  packages: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      # INTENTIONALLY BROKEN for demo/testing failure notifications
      - name: Health check API (intentional failure)
        run: |
          curl --fail http://localhost:8000/api/v1/does-not-exist

      - name: Stop app stack
        if: always()
        run: docker compose down -v

      - name: Log in to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: success()
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fastapi-beyond-crud:nightly

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Nightly build failed: ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            The nightly build failed for ${{ github.repository }}.

            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            This run used an intentionally broken endpoint health check for failure testing.
