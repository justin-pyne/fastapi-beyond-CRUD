name: PR Conventional Commit Check

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title follows Conventional Commits
        id: semantic_pr
        uses: amannn/action-semantic-pull-request@v6
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close PR if title is invalid
        if: steps.semantic_pr.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "Closing this PR because the title does not follow Conventional Commits (e.g., `feat: ...`, `fix: ...`, `docs: ...`). Please rename the PR title and reopen."
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });

      - name: Send email notification on failure
        if: steps.semantic_pr.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "PR Closed: Conventional Commit check failed"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            A pull request in ${{ github.repository }} was automatically closed because the PR title did not follow Conventional Commits.

            PR Title: ${{ github.event.pull_request.title }}
            PR Number: #${{ github.event.pull_request.number }}
            PR URL: ${{ github.event.pull_request.html_url }}

            Expected format examples:
            - feat: add user login
            - fix: correct token validation
            - docs: update setup instructions

            